<div class="container">
  <div class="about-container">
    <div class="about-header">
      <div class="side-left">
        <img
          height="60px"
          width="60px"
          src="{{ socialUser.photoUrl }}"
          alt=""
        />
      </div>
      <div class="side-right">
        <h2>{{ socialUser.firstName }}</h2>
        <p>{{ socialUser.email }}</p>
      </div>
      <i class="fa-solid fa-pencil"></i>
    </div>

    <div class="case">
      <div class="data">
        <i class="fa-brands fa-whatsapp"></i>
        &nbsp;
        <p>{{ userFromPs.contato }}</p>
      </div>
    </div>

    <div #addresses class="carrocel-address">
      <div
        class="carrocel-header"
        (click)="this.addresses.classList.toggle('active')"
      >
        <p><strong>Meus Endereços</strong></p>
        <i class="fa-solid fa-caret-up"></i>
      </div>
      <div class="carrocel-content">
        <div class="card-address-plus">
          <button id="btn-add">Adicionar</button>
          <!-- <button id="btn-edit">Editar</button> -->
        </div>
        <div class="cards-wrapper">
          <div class="card-address" *ngFor="let a of userFromPs.enderecos">
            <div class="title">
              <p>
                <strong> {{ a.nomeDoEndereco }} </strong>
              </p>
              <i class="fa-solid fa-pencil"></i>
            </div>
            <p>{{ a.cep }}</p>
            <p>{{ a.numeroDaCasa }}</p>
            <p>{{ a.localidade }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div
    style="
      height: 39px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-items: center;
    "
  >
    <button class="sair" (click)="sair()">Sair da conta</button>
  </div>
</div>
<div id="fade" class="desatived"></div>
<div id="modal-add-addrss" class="desatived">
  <div class="modal-header">
    <p style="color: var(--color-4); margin-left: 10px">Meu Endereço</p>
    <div class="close">
      <i class="fa-solid fa-xmark"></i>
    </div>
  </div>
  <div class="modal-content">
    <h2>Adicionar Endereço</h2>
    <div class="address-fields">
      <input type="text">
      <input type="text">
      <input type="text">
      <input type="text">
    </div>
    <button id="btn-add">Adicionar</button>
  </div>
</div>
<div id="modal-add-addrss" class="desatived">
  <div class="modal-header">
    <p style="color: var(--color-4); margin-left: 10px">Meu Endereço</p>
    <div class="close">
      <i class="fa-solid fa-xmark"></i>
    </div>
  </div>
  <div class="modal-content">

  </div>
</div>
